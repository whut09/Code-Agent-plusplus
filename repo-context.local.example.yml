# Copy this file to repo-context.local.yml for local LLM usage.
# Keep repo-context.local.yml private. It is ignored by git.
llm:
  enabled: true
  provider: openai-compatible
  baseUrl: xx
  apiKey: xx
  model: xx
  temperature: 0.2
  maxTokens: 1200

rag:
  enabled: true
  provider: lightrag
  mode: export
  serverUrl: xx
  apiKey: xx
  workspace: default
  chunkTokenLimit: 900
