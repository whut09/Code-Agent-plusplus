target: codex
tokenBudget: 60000

include:
  - "**/*"

exclude:
  - node_modules/**
  - dist/**
  - build/**
  - coverage/**
  - .next/**
  - .venv/**

llm:
  enabled: false
  provider: openai-compatible
  baseUrl: xx
  apiKey: xx
  model: xx
  temperature: 0.2
  maxTokens: 1200

rag:
  provider: lightrag
  chunkTokenLimit: 900

outputs:
  agents: true
  modules: true
  graph: true
  tasks: true
  readiness: true
  rag: true
